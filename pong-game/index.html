<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pong</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; color: #fff; font-family: monospace; }
  canvas { border: 2px solid #fff; background: #000; }
  #info { position: absolute; top: 10px; text-align: center; width: 100%; }
  #score { font-size: 24px; margin-bottom: 5px; }
  #controls { font-size: 12px; color: #aaa; }
</style>
</head>
<body>
<div id="info">
  <div id="score">0 - 0</div>
  <div id="controls">W/S = Player 1 &nbsp;|&nbsp; ↑/↓ = Player 2 &nbsp;|&nbsp; Space = Pause</div>
</div>
<canvas id="game" width="800" height="500"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

const PADDLE_W = 12, PADDLE_H = 80, BALL_SIZE = 10;
const PADDLE_SPEED = 6, BALL_SPEED_INIT = 5;
const WIN_SCORE = 5;

let state = 'playing'; // playing | paused | gameover
let playerScore = 0, aiScore = 0;

const player = { x: 20, y: canvas.height / 2 - PADDLE_H / 2, dy: 0 };
const ai    = { x: canvas.width - 20 - PADDLE_W, y: canvas.height / 2 - PADDLE_H / 2, dy: 0 };
const ball  = { x: canvas.width / 2, y: canvas.height / 2, vx: BALL_SPEED_INIT, vy: BALL_SPEED_INIT };

const keys = {};
document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === ' ') { e.preventDefault(); togglePause(); }
});
document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

function togglePause() {
  if (state === 'playing') state = 'paused';
  else if (state === 'paused') state = 'playing';
}

function resetBall(direction) {
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;
  ball.vx = BALL_SPEED_INIT * direction;
  ball.vy = (Math.random() - 0.5) * BALL_SPEED_INIT * 2;
}

function update() {
  if (state !== 'playing') return;

  // Player 1 (W/S)
  if (keys['w']) player.dy = -PADDLE_SPEED;
  else if (keys['s']) player.dy = PADDLE_SPEED;
  else player.dy = 0;

  // Player 2 (arrows)
  if (keys['arrowup']) ai.dy = -PADDLE_SPEED;
  else if (keys['arrowdown']) ai.dy = PADDLE_SPEED;
  else ai.dy = 0;

  player.y += player.dy;
  ai.y += ai.dy;
  player.y = Math.max(0, Math.min(canvas.height - PADDLE_H, player.y));
  ai.y = Math.max(0, Math.min(canvas.height - PADDLE_H, ai.y));

  ball.x += ball.vx;
  ball.y += ball.vy;

  // Top/bottom bounce
  if (ball.y <= 0 || ball.y + BALL_SIZE >= canvas.height) {
    ball.vy *= -1;
    ball.y = Math.max(0, Math.min(canvas.height - BALL_SIZE, ball.y));
  }

  // Paddle collisions
  if (rectIntersect(ball.x, ball.y, BALL_SIZE, BALL_SIZE, player.x, player.y, PADDLE_W, PADDLE_H)) {
    ball.vx = Math.abs(ball.vx) * 1.05;
    let offset = (ball.y + BALL_SIZE / 2) - (player.y + PADDLE_H / 2);
    ball.vy = offset * 0.2;
  }
  if (rectIntersect(ball.x, ball.y, BALL_SIZE, BALL_SIZE, ai.x, ai.y, PADDLE_W, PADDLE_H)) {
    ball.vx = -Math.abs(ball.vx) * 1.05;
    let offset = (ball.y + BALL_SIZE / 2) - (ai.y + PADDLE_H / 2);
    ball.vy = offset * 0.2;
  }

  // Scoring
  if (ball.x < 0) { aiScore++; checkWin(); resetBall(1); }
  if (ball.x > canvas.width) { playerScore++; checkWin(); resetBall(-1); }

  // Cap speed
  const maxSpeed = 12;
  ball.vx = Math.max(-maxSpeed, Math.min(maxSpeed, ball.vx));
  ball.vy = Math.max(-maxSpeed, Math.min(maxSpeed, ball.vy));

  scoreEl.textContent = `${playerScore} - ${aiScore}`;
}

function rectIntersect(x1, y1, w1, h1, x2, y2, w2, h2) {
  return x1 < x2 + w2 && x1 + w1 > x2 && y1 < y2 + h2 && y1 + h1 > y2;
}

function checkWin() {
  if (playerScore >= WIN_SCORE || aiScore >= WIN_SCORE) {
    state = 'gameover';
    const winner = playerScore >= WIN_SCORE ? 'Player 1' : 'Player 2';
    setTimeout(() => alert(`${winner} wins!`), 50);
  }
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Center line
  ctx.strokeStyle = '#333';
  ctx.setLineDash([8, 8]);
  ctx.beginPath();
  ctx.moveTo(canvas.width / 2, 0);
  ctx.lineTo(canvas.width / 2, canvas.height);
  ctx.stroke();
  ctx.setLineDash([]);

  // Paddles
  ctx.fillStyle = '#fff';
  ctx.fillRect(player.x, player.y, PADDLE_W, PADDLE_H);
  ctx.fillRect(ai.x, ai.y, PADDLE_W, PADDLE_H);

  // Ball
  ctx.fillRect(ball.x, ball.y, BALL_SIZE, BALL_SIZE);

  // Overlay
  if (state === 'paused') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = '30px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);
  }
  if (state === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    ctx.font = '30px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
    ctx.font = '16px monospace';
    ctx.fillText('Refresh to play again', canvas.width / 2, canvas.height / 2 + 40);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
