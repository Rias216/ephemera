<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Pong</title>
<style>
* {
margin: 0;
padding: 0;
box-sizing: border-box;
}

body {
background: linear-gradient(135deg, #1a0020 0%, #2d0033 50%, #1a0025 100%);
display: flex;
justify-content: center;
align-items: center;
min-height: 100vh;
font-family: 'Courier New', monospace;
color: #fff;
overflow: hidden;
}

body::before {
content: '';
position: fixed;
top: 0; left: 0; right: 0; bottom: 0;
background:
radial-gradient(ellipse at 20% 50%, rgba(255, 20, 147, 0.08) 0%, transparent 60%),
radial-gradient(ellipse at 80% 50%, rgba(255, 105, 180, 0.08) 0%, transparent 60%),
radial-gradient(ellipse at 50% 0%, rgba(255, 0, 128, 0.05) 0%, transparent 50%);
pointer-events: none;
z-index: 0;
}

.game-container {
text-align: center;
position: relative;
z-index: 1;
}

h1 {
margin-bottom: 12px;
font-size: 32px;
letter-spacing: 8px;
color: #ff69b4;
text-shadow:
0 0 10px #ff69b4,
0 0 20px #ff69b4,
0 0 40px #ff1493,
0 0 80px #ff1493;
animation: titlePulse 2s ease-in-out infinite;
}

@keyframes titlePulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.85; }
}

canvas {
border: 2px solid #ff69b4;
background: #0d0015;
display: block;
margin: 0 auto;
box-shadow:
0 0 15px rgba(255, 105, 180, 0.4),
0 0 30px rgba(255, 20, 147, 0.2),
inset 0 0 60px rgba(255, 20, 147, 0.03);
}

.score {
font-size: 28px;
margin-top: 14px;
letter-spacing: 6px;
color: #ffb6d9;
text-shadow: 0 0 10px rgba(255, 105, 180, 0.6);
}

.score span {
color: #ff69b4;
text-shadow: 0 0 15px #ff1493, 0 0 30px #ff69b4;
font-weight: bold;
}

.info {
margin-top: 12px;
font-size: 13px;
color: #c97a9e;
letter-spacing: 1px;
}

.info span {
color: #ffb6d9;
text-shadow: 0 0 8px rgba(255, 105, 180, 0.5);
font-weight: bold;
}

@keyframes float {
0%, 100% { transform: translateY(0px); }
50% { transform: translateY(-4px); }
}

</style>
</head>
<body>
<div class="game-container">
<h1>✦ NEON PONG ✦</h1>
<canvas id="pong" width="800" height="500"></canvas>
<div class="score">
<span id="playerScore">0</span> — <span id="computerScore">0</span>
</div>
<div class="info">
<span>W / S</span> or <span>↑ / ↓</span> to move &nbsp;|&nbsp; First to <span>5</span> wins &nbsp;|&nbsp; <span>SPACE</span> to replay
</div>
</div>

<script>
const canvas = document.getElementById('pong');
const ctx = canvas.getContext('2d');

const PADDLE_WIDTH = 10;
const PADDLE_HEIGHT = 80;
const BALL_SIZE = 10;
const WINNING_SCORE = 5;

const PINK_NEON = '#ff69b4';
const PINK_HOT = '#ff1493';
const PINK_LIGHT = '#ffb6d9';
const PINK_DIM = '#8b1a5c';
const BG_DARK = '#0d0015';

const player = {
x: 20,
y: canvas.height / 2 - PADDLE_HEIGHT / 2,
width: PADDLE_WIDTH,
height: PADDLE_HEIGHT,
dy: 0,
speed: 6
};

const computer = {
x: canvas.width - 20 - PADDLE_WIDTH,
y: canvas.height / 2 - PADDLE_HEIGHT / 2,
width: PADDLE_WIDTH,
height: PADDLE_HEIGHT,
speed: 4.5
};

const ball = {
x: canvas.width / 2,
y: canvas.height / 2,
size: BALL_SIZE,
dx: 5,
dy: 5,
speed: 5,
trail: []
};

let playerScore = 0;
let computerScore = 0;
let gameOver = false;
let winner = '';
let frameCount = 0;

const keys = {};

document.addEventListener('keydown', (e) => {
keys[e.key] = true;
if (e.key === ' ' && gameOver) {
playerScore = 0;
computerScore = 0;
gameOver = false;
winner = '';
updateScore();
resetBall(Math.random() < 0.5 ? 1 : -1);
}
});

document.addEventListener('keyup', (e) => {
keys[e.key] = false;
});

function resetBall(direction) {
ball.x = canvas.width / 2;
ball.y = canvas.height / 2;
ball.dx = direction * ball.speed;
ball.dy = (Math.random() - 0.5) * 6;
ball.trail = [];
}

function update() {
if (gameOver) return;

frameCount++;

// Player movement
if (keys['w'] || keys['W'] || keys['ArrowUp']) {
player.y -= player.speed;
}
if (keys['s'] || keys['S'] || keys['ArrowDown']) {
player.y += player.speed;
}
player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

// Computer AI
const computerCenter = computer.y + computer.height / 2;
if (computerCenter < ball.y - 10) {
computer.y += computer.speed;
} else if (computerCenter > ball.y + 10) {
computer.y -= computer.speed;
}
computer.y = Math.max(0, Math.min(canvas.height - computer.height, computer.y));

// Ball movement
ball.trail.push({ x: ball.x, y: ball.y });
if (ball.trail.length > 8) ball.trail.shift();

ball.x += ball.dx;
ball.y += ball.dy;

// Top/bottom bounce
if (ball.y <= 0 || ball.y + ball.size >= canvas.height) {
ball.dy *= -1;
ball.y = Math.max(0, Math.min(canvas.height - ball.size, ball.y));
}

// Paddle collisions
if (
ball.x <= player.x + player.width &&
ball.y + ball.size >= player.y &&
ball.y <= player.y + player.height &&
ball.dx < 0
) {
ball.dx = Math.abs(ball.dx) * 1.05;
const hitPos = (ball.y + ball.size / 2) - (player.y + player.height / 2);
ball.dy = hitPos * 0.15;
ball.x = player.x + player.width;
}

if (
ball.x + ball.size >= computer.x &&
ball.y + ball.size >= computer.y &&
ball.y <= computer.y + computer.height &&
ball.dx > 0
) {
ball.dx = -Math.abs(ball.dx) * 1.05;
const hitPos = (ball.y + ball.size / 2) - (computer.y + computer.height / 2);
ball.dy = hitPos * 0.15;
ball.x = computer.x - ball.size;
}

// Scoring
if (ball.x + ball.size < 0) {
computerScore++;
updateScore();
if (computerScore >= WINNING_SCORE) {
gameOver = true;
winner = 'COMPUTER';
} else {
resetBall(1);
}
}

if (ball.x > canvas.width) {
playerScore++;
updateScore();
if (playerScore >= WINNING_SCORE) {
gameOver = true;
winner = 'PLAYER';
} else {
resetBall(-1);
}
}

// Cap ball speed
const maxSpeed = 12;
ball.dx = Math.max(-maxSpeed, Math.min(maxSpeed, ball.dx));
ball.dy = Math.max(-maxSpeed, Math.min(maxSpeed, ball.dy));
}

function updateScore() {
document.getElementById('playerScore').textContent = playerScore;
document.getElementById('computerScore').textContent = computerScore;
}

function draw() {
// Clear with fade effect
ctx.fillStyle = BG_DARK;
ctx.fillRect(0, 0, canvas.width, canvas.height);

// Subtle grid
ctx.strokeStyle = 'rgba(255, 20, 147, 0.04)';
ctx.lineWidth = 1;
const gridSize = 40;
for (let x = gridSize; x < canvas.width; x += gridSize) {
ctx.beginPath();
ctx.moveTo(x, 0);
ctx.lineTo(x, canvas.height);
ctx.stroke();
}
for (let y = gridSize; y < canvas.height; y += gridSize) {
ctx.beginPath();
ctx.moveTo(0, y);
ctx.lineTo(canvas.width, y);
ctx.stroke();
}

// Center line
ctx.setLineDash([6, 10]);
ctx.strokeStyle = 'rgba(255, 105, 180, 0.3)';
ctx.lineWidth = 2;
ctx.beginPath();
ctx.moveTo(canvas.width / 2, 0);
ctx.lineTo(canvas.width / 2, canvas.height);
ctx.stroke();
ctx.setLineDash([]);

// Ball trail
ball.trail.forEach((pos, i) => {
const alpha = (i / ball.trail.length) * 0.4;
const size = ball.size * (i / ball.trail.length);
ctx.fillStyle = `rgba(255, 105, 180, ${alpha})`;
ctx.shadowColor = PINK_HOT;
ctx.shadowBlur = 10;
ctx.fillRect(pos.x, pos.y, size, size);
});
ctx.shadowBlur = 0;

// Paddles with glow
function drawPaddle(x, y, w, h) {
ctx.shadowColor = PINK_HOT;
ctx.shadowBlur = 15;
ctx.fillStyle = PINK_NEON;
ctx.fillRect(x, y, w, h);

// Inner highlight
ctx.shadowBlur = 0;
ctx.fillStyle = PINK_LIGHT;
ctx.fillRect(x + 2, y + 2, w - 4, 3);
ctx.fillRect(x + 2, y + 2, 2, h - 4);
}
drawPaddle(player.x, player.y, player.width, player.height);
drawPaddle(computer.x, computer.y, computer.width, computer.height);

// Ball with glow
ctx.shadowColor = PINK_HOT;
ctx.shadowBlur = 20;
ctx.fillStyle = '#fff';
ctx.fillRect(ball.x, ball.y, ball.size, ball.size);

// Ball inner pink core
ctx.shadowBlur = 0;
ctx.fillStyle = PINK_LIGHT;
ctx.fillRect(ball.x + 2, ball.y + 2, ball.size - 4, ball.size - 4);
ctx.shadowBlur = 0;

// Game over overlay
if (gameOver) {
ctx.fillStyle = 'rgba(13, 0, 21, 0.85)';
ctx.fillRect(0, 0, canvas.width, canvas.height);

// Decorative lines
ctx.strokeStyle = 'rgba(255, 105, 180, 0.2)';
ctx.lineWidth = 1;
for (let i = 0; i < 5; i++) {
const y = canvas.height / 2 - 60 + i * 30;
ctx.beginPath();
ctx.moveTo(canvas.width / 2 - 100, y);
ctx.lineTo(canvas.width / 2 + 100, y);
ctx.stroke();
}

ctx.shadowColor = PINK_HOT;
ctx.shadowBlur = 25;
ctx.fillStyle = PINK_NEON;
ctx.font = 'bold 52px Courier New';
ctx.textAlign = 'center';
ctx.fillText(`${winner} WINS!`, canvas.width / 2, canvas.height / 2 - 10);

ctx.shadowBlur = 0;
ctx.font = '18px Courier New';
ctx.fillStyle = PINK_LIGHT;
ctx.fillText('Press SPACE to play again', canvas.width / 2, canvas.height / 2 + 35);
}
}

document.addEventListener('keydown', (e) => {
if (e.key === ' ' && gameOver) {
playerScore = 0;
computerScore = 0;
gameOver = false;
winner = '';
updateScore();
resetBall(Math.random() < 0.5 ? 1 : -1);
}
});

function gameLoop() {
update();
draw();
requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
