<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a1a">
<title>Pong</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%;
    background: #0a0a1a;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    color: #fff;
  }
  #wrap {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  canvas {
    display: block;
    background: #0a0a1a;
    border: 2px solid #2a2a4a;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(80, 120, 255, 0.15);
    max-width: 100%;
    max-height: 100%;
  }
  #hud {
    position: fixed;
    top: calc(env(safe-area-inset-top, 12px) + 12px);
    left: 0; right: 0;
    display: flex; justify-content: center; gap: 32px;
    font-size: 28px; font-weight: 700;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(120, 160, 255, 0.6);
    pointer-events: none;
    z-index: 10;
  }
  #start {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px;
    background: rgba(10, 10, 26, 0.92);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 20;
    transition: opacity 0.3s;
  }
  #start.hidden { opacity: 0; pointer-events: none; }
  #start h1 {
    font-size: 42px; font-weight: 800;
    letter-spacing: 6px;
    background: linear-gradient(180deg, #8ab4ff, #4a6ad4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  #start p { color: #8899bb; font-size: 14px; }
  #start button {
    margin-top: 10px;
    padding: 14px 40px;
    font-size: 16px; font-weight: 600;
    letter-spacing: 2px;
    color: #fff;
    background: linear-gradient(180deg, #4a6ad4, #2a3f8a);
    border: none; border-radius: 999px;
    box-shadow: 0 4px 20px rgba(60, 100, 220, 0.4);
    cursor: pointer;
  }
  #start button:active { transform: scale(0.97); }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud"><span id="sL">0</span><span id="sR">0</span></div>
  <canvas id="c"></canvas>
</div>

<div id="start">
  <h1>PONG</h1>
  <p>Drag anywhere to move your paddle</p>
  <button id="go">START</button>
</div>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const startScreen = document.getElementById('start');
  const goBtn = document.getElementById('go');
  const sL = document.getElementById('sL');
  const sR = document.getElementById('sR');

  // Audio (tiny synth beeps, no assets needed)
  let audioCtx = null;
  const beep = (freq = 440, dur = 0.08, type = 'square', vol = 0.08) => {
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.value = vol;
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime + dur);
    } catch (_) {}
  };

  // Layout
  const resize = () => {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const maxW = window.innerWidth - 24;
    const maxH = window.innerHeight - 80;
    const aspect = 2 / 3; // portrait-friendly
    let w = maxW;
    let h = w / aspect;
    if (h > maxH) { h = maxH; w = h * aspect; }
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    W = w; H = h;
    resetPositions();
  };
  let W, H;

  // Game state
  const state = {
    running: false,
    scoreL: 0, scoreR: 0,
    ball: { x: 0, y: 0, vx: 0, vy: 0, r: 0 },
    paddleH: 0, paddleW: 0,
    pyL: 0, pyR: 0,   // paddle y-centers
    speed: 0,
    rally: 0,
    touchY: null,
    lastTime: 0,
  };

  const resetPositions = () => {
    state.paddleW = Math.max(10, W * 0.018);
    state.paddleH = Math.max(60, H * 0.16);
    state.ball.r = Math.max(6, Math.min(W, H) * 0.018);
    state.pyL = H / 2;
    state.pyR = H / 2;
    if (!state.running) centerBall();
  };

  const centerBall = () => {
    const b = state.ball;
    b.x = W / 2; b.y = H / 2;
    const a = Math.random() * Math.PI * 0.5 - Math.PI / 4;
    const dir = Math.random() < 0.5 ? 1 : -1;
    state.speed = Math.min(W, H) * 0.55;
    b.vx = Math.cos(a) * state.speed * dir;
    b.vy = Math.sin(a) * state.speed;
    state.rally = 0;
  };

  const resetRound = (scorer) => {
    if (scorer === 'L') state.scoreL++;
    else state.scoreR++;
    sL.textContent = state.scoreL;
    sR.textContent = state.scoreR;
    centerBall();
  };

  // Input (touch + mouse)
  const getPos = (e) => {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return (src.clientY - r.top) / r.height * H;
  };

  const onDown = (e) => {
    state.touchY = getPos(e);
    if (!state.running && startScreen.classList.contains('hidden')) {
      state.running = true;
      state.lastTime = performance.now();
      if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    }
  };
  const onMove = (e) => {
    if (state.touchY !== null) state.touchY = getPos(e);
  };
  const onUp = () => { state.touchY = null; };

  canvas.addEventListener('touchstart', onDown, { passive: false });
  canvas.addEventListener('touchmove', onMove, { passive: false });
  canvas.addEventListener('touchend', onUp);
  canvas.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);

  goBtn.addEventListener('click', () => {
    startScreen.classList.add('hidden');
    state.running = true;
    state.lastTime = performance.now();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  });

  // Physics
  const update = (dt) => {
    const b = state.ball;
    const halfPH = state.paddleH / 2;
    const margin = Math.max(12, W * 0.04);

    // Move left paddle (player) toward touch
    if (state.touchY !== null) {
      const target = state.touchY;
      const cur = state.pyL;
      const diff = target - cur;
      const maxMove = state.speed * dt * 1.4;
      if (Math.abs(diff) < maxMove) state.pyL = target;
      else state.pyL += Math.sign(diff) * maxMove;
    }
    // Clamp
    state.pyL = Math.max(halfPH, Math.min(H - halfPH, state.pyL));

    // AI for right paddle
    const aiTarget = b.y;
    const aiDiff = aiTarget - state.pyR;
    const aiSpeed = state.speed * (0.55 + Math.min(state.rally * 0.02, 0.35));
    const aiMax = aiSpeed * dt;
    if (Math.abs(aiDiff) < aiMax) state.pyR = aiTarget;
    else state.pyR += Math.sign(aiDiff) * aiMax;
    state.pyR = Math.max(halfPH, Math.min(H - halfPH, state.pyR));

    // Ball
    b.x += b.vx * dt;
    b.y += b.vy * dt;

    // Top/bottom bounce
    if (b.y - b.r < 0) { b.y = b.r; b.vy = Math.abs(b.vy); beep(300, 0.05); }
    if (b.y + b.r > H) { b.y = H - b.r; b.vy = -Math.abs(b.vy); beep(300, 0.05); }

    // Paddle collision
    const hitL = b.x - b.r < margin + state.paddleW &&
                 b.y > state.pyL - halfPH - b.r &&
                 b.y < state.pyL + halfPH + b.r &&
                 b.vx < 0;
    const hitR = b.x + b.r > W - margin - state.paddleW &&
                 b.y > state.pyR - halfPH - b.r &&
                 b.y < state.pyR + halfPH + b.r &&
                 b.vx > 0;

    if (hitL || hitR) {
      const paddle = hitL ? state.pyL : state.pyR;
      const offset = (b.y - paddle) / halfPH; // -1..1
      const angle = offset * Math.PI / 3.5;
      const dir = hitL ? 1 : -1;
      state.rally++;
      state.speed = Math.min(W * 0.9, state.speed * 1.04);
      b.vx = Math.cos(angle) * state.speed * dir;
      b.vy = Math.sin(angle) * state.speed;
      b.x = hitL ? margin + state.paddleW + b.r : W - margin - state.paddleW - b.r;
      beep(hitL ? 520 : 660, 0.07, 'triangle');
    }

    // Score
    if (b.x < -b.r * 2) { resetRound('R'); beep(180, 0.25, 'sawtooth'); }
    if (b.x > W + b.r * 2) { resetRound('L'); beep(220, 0.25, 'sawtooth'); }
  };

  const draw = () => {
    ctx.clearRect(0, 0, W, H);

    // Dashed center line
    ctx.strokeStyle = '#2a2a4a';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 10]);
    ctx.beginPath();
    ctx.moveTo(W / 2, 0);
    ctx.lineTo(W / 2, H);
    ctx.stroke();
    ctx.setLineDash([]);

    // Paddles
    const margin = Math.max(12, W * 0.04);
    const halfPH = state.paddleH / 2;

    const drawPaddle = (cx, cy) => {
      const x = cx - state.paddleW / 2;
      const y = cy - halfPH;
      const grad = ctx.createLinearGradient(x, y, x + state.paddleW, y);
      grad.addColorStop(0, '#6a8cff');
      grad.addColorStop(1, '#3a5ad4');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.roundRect(x, y, state.paddleW, state.paddleH, state.paddleW * 0.6);
      ctx.fill();
      // glow
      ctx.shadowColor = 'rgba(100,140,255,0.5)';
      ctx.shadowBlur = 12;
      ctx.fill();
      ctx.shadowColor = 'transparent';
      ctx.shadowBlur = 0;
    };

    drawPaddle(margin, state.pyL);
    drawPaddle(W - margin, state.pyR);

    // Ball
    const b = state.ball;
    const bg = ctx.createRadialGradient(b.x - b.r * 0.3, b.y - b.r * 0.3, b.r * 0.1, b.x, b.y, b.r);
    bg.addColorStop(0, '#ffffff');
    bg.addColorStop(0.4, '#aaccff');
    bg.addColorStop(1, '#4a6ad4');
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowColor = 'rgba(120,160,255,0.7)';
    ctx.shadowBlur = 16;
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
  };

  const loop = (now) => {
    const dt = Math.min((now - state.lastTime) / 1000, 0.05);
    state.lastTime = now;
    if (state.running) update(dt);
    draw();
    requestAnimationFrame(loop);
  };

  window.addEventListener('resize', resize);
  resize();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
