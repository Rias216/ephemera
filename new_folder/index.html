<!DOCTYPE html>
<html>
<head>
    <title>Pong</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #111;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        canvas {
            border: 2px solid #fff;
            background: #000;
        }
        .info {
            position: absolute;
            top: 20px;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>PONG</h1>
        <p>Player 1: W/S | Player 2: ↑/↓ | Space: Start/Pause</p>
    </div>
    <canvas id="pong" width="800" height="500"></canvas>
    <script>
        const canvas = document.getElementById('pong');
        const ctx = canvas.getContext('2d');

        const paddleWidth = 10;
        const paddleHeight = 100;
        const ballSize = 10;

        const player1 = { x: 10, y: 200, width: paddleWidth, height: paddleHeight, score: 0 };
        const player2 = { x: 780, y: 200, width: paddleWidth, height: paddleHeight, score: 0 };
        const ball = { x: 400, y: 250, size: ballSize, speedX: 5, speedY: 5 };

        const keys = {};
        document.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (e.key === ' ' && !gameRunning) {
                startGame();
            } else if (e.key === ' ' && gameRunning) {
                gameRunning = false;
            }
        });
        document.addEventListener('keyup', (e) => keys[e.key] = false);

        let gameRunning = false;

        function startGame() {
            resetBall();
            gameRunning = true;
            gameLoop();
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speedX = 5 * (Math.random() > 0.5 ? 1 : -1);
            ball.speedY = 5 * (Math.random() > 0.5 ? 1 : -1);
        }

        function update() {
            if (keys['w'] || keys['W']) player1.y -= 6;
            if (keys['s'] || keys['S']) player1.y += 6;
            if (keys['ArrowUp']) player2.y -= 6;
            if (keys['ArrowDown']) player2.y += 6;

            player1.y = Math.max(0, Math.min(canvas.height - player1.height, player1.y));
            player2.y = Math.max(0, Math.min(canvas.height - player2.height, player2.y));

            ball.x += ball.speedX;
            ball.y += ball.speedY;

            if (ball.y <= 0 || ball.y + ball.size >= canvas.height) {
                ball.speedY *= -1;
            }

            if (ball.x <= player1.x + player1.width && 
                ball.y + ball.size >= player1.y && 
                ball.y <= player1.y + player1.height) {
                ball.speedX *= -1.1;
                ball.x = player1.x + player1.width;
            }

            if (ball.x + ball.size >= player2.x && 
                ball.y + ball.size >= player2.y && 
                ball.y <= player2.y + player2.height) {
                ball.speedX *= -1.1;
                ball.x = player2.x - ball.size;
            }

            if (ball.x < 0) {
                player2.score++;
                resetBall();
            }
            if (ball.x > canvas.width) {
                player1.score++;
                resetBall();
            }
        }

        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.strokeStyle = '#333';
            ctx.setLineDash([10, 10]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            ctx.fillStyle = '#fff';
            ctx.fillRect(player1.x, player1.y, player1.width, player1.height);
            ctx.fillRect(player2.x, player2.y, player2.width, player2.height);
            ctx.fillRect(ball.x, ball.y, ball.size, ball.size);

            ctx.font = '48px Arial';
            ctx.fillText(player1.score, canvas.width / 4, 50);
            ctx.fillText(player2.score, 3 * canvas.width / 4, 50);

            if (!gameRunning) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#fff';
                ctx.font = '36px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('Press SPACE to Start', canvas.width / 2, canvas.height / 2);
                ctx.textAlign = 'left';
            }
        }

        function gameLoop() {
            if (!gameRunning) {
                draw();
                return;
            }
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        draw();
    </script>
</body>
</html>
